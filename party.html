<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RO Guild - จัดตั้ง Party</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #1a0000; --card: #2a0a0a; --text: #f1f5f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        .header { text-align: center; background: #3b0000; padding: 20px; border-radius: 12px; margin-bottom: 24px; border-bottom: 4px solid #dc2626; }
        .header h1 { font-size: 1.5rem; margin-bottom: 6px; }
        .status-cloud { font-size: 0.7rem; color: #10b981; margin-bottom: 8px; }
        .btn-back { display: inline-block; background: #4b1010; color: #f1f5f9; font-weight: bold; border: none; border-radius: 8px; padding: 8px 18px; cursor: pointer; font-size: 0.9rem; text-decoration: none; }
        .add-card { background: #2a0a0a; padding: 18px 20px; border-radius: 12px; margin-bottom: 24px; border: 1px solid #7f1d1d; }
        .add-card h2 { color: #fca5a5; margin-bottom: 14px; font-size: 1rem; }
        .add-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .add-row input, .add-row select { flex: 1; min-width: 140px; padding: 10px 13px; border-radius: 8px; border: 1px solid #7f1d1d; background: #1a0000; color: white; outline: none; font-size: 0.95rem; }
        .btn-add-member { background: #dc2626; color: white; font-weight: bold; border: none; border-radius: 8px; padding: 10px 22px; cursor: pointer; white-space: nowrap; font-size: 0.95rem; }
        .section-title { font-size: 0.85rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
        .parties-wrap { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; align-items: flex-start; }
        .party-box { background: #2a0a0a; border-radius: 12px; border: 2px solid #7f1d1d; min-width: 220px; width: 220px; transition: border-color 0.2s; }
        .party-box.drag-over { border-color: #f87171; background: #3b0f0f; }
        .party-header { padding: 10px 12px; border-bottom: 1px solid #7f1d1d; display: flex; align-items: center; justify-content: space-between; gap: 6px; }
        .party-name-display { font-weight: bold; color: #fca5a5; cursor: pointer; flex: 1; font-size: 0.95rem; }
        .party-name-input { flex: 1; background: #1a0000; border: 1px solid #dc2626; color: white; border-radius: 5px; padding: 3px 7px; font-size: 0.9rem; outline: none; display: none; }
        .party-count { font-size: 0.75rem; color: #9ca3af; }
        .btn-del-party { background: none; border: none; color: #7f1d1d; cursor: pointer; font-size: 0.85rem; }
        .party-members { min-height: 60px; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .drop-hint { color: #7f1d1d; font-size: 0.8rem; text-align: center; padding: 12px 0; border: 2px dashed #7f1d1d; border-radius: 8px; }
        .btn-add-party { background: #2a0a0a; border: 2px dashed #7f1d1d; color: #9ca3af; border-radius: 12px; min-width: 110px; padding: 20px 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .chip { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; cursor: grab; border: 1px solid transparent; }
        .chip.dragging { opacity: 0.35; }
        .chip-info { flex: 1; min-width: 0; }
        .chip-name { font-size: 0.9rem; font-weight: bold; overflow: hidden; text-overflow: ellipsis; }
        .chip-job { font-size: 0.72rem; opacity: 0.7; }
        .chip-del { background: none; border: none; color: #7f1d1d; cursor: pointer; }
        .job-red { background: #3b0000; border-color: #ef4444 !important; }
        .job-purple { background: #2e1065; border-color: #7c3aed !important; }
        .job-yellow { background: #3b2000; border-color: #d97706 !important; }
        .job-green { background: #052e16; border-color: #16a34a !important; }
        .job-pink { background: #4a044e; border-color: #d946ef !important; }
        .job-blue { background: #0c1a3b; border-color: #3b82f6 !important; }
        .job-brown { background: #1c0a00; border-color: #92400e !important; }
        .job-default { background: #2a0a0a; border-color: #475569 !important; }
        .pool-card { background: #2a0a0a; border-radius: 12px; border: 1px solid #7f1d1d; overflow: hidden; }
        .pool-header { padding: 12px 16px; background: #3b0000; border-bottom: 1px solid #7f1d1d; display: flex; justify-content: space-between; }
        .pool-grid { display: flex; flex-wrap: wrap; gap: 8px; padding: 14px; min-height: 80px; }
        .pool-empty { color: #7f1d1d; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚔️ จัดตั้ง Party กิลด์</h1>
        <div class="status-cloud" id="cloudStatus">☁️ กำลังเชื่อมต่อ...</div>
        <a href="index.html" class="btn-back">← กลับหน้าคิวประมูล</a>
    </div>

    <div class="add-card">
        <h2>➕ เพิ่มสมาชิกลงคลัง</h2>
        <div class="add-row">
            <input type="text" id="memberName" placeholder="ชื่อตัวละคร..." onkeypress="if(event.key==='Enter') addMember()">
            <select id="memberJob">
                <option value="">-- เลือกอาชีพ --</option>
                <optgroup label="🛡️ Tank">
                    <option value="Lord Knight">Lord Knight</option>
                    <option value="Paladin">Paladin</option>
                </optgroup>
                <optgroup label="⚒️ DPS">
                    <option value="Monk">Monk</option>
                    <option value="Assassin">Assassin</option>
                    <option value="Stalker">Stalker</option>
                    <option value="Biochemist">Biochemist</option>
                    <option value="Mastersmith">Mastersmith</option>
                </optgroup>
                <optgroup label="🎵 Support">
                    <option value="Priest">Priest</option>
                    <option value="Bard">Bard</option>
                    <option value="Dancer">Dancer</option>
                </optgroup>
                <optgroup label="🏹 Ranged">
                    <option value="Sniper">Sniper</option>
                </optgroup>
                <optgroup label="✨ Magic">
                    <option value="Wizard">Wizard</option>
                    <option value="Sage">Sage</option>
                </optgroup>
                <optgroup label="🌸 Other">
                    <option value="Summoner">Summoner</option>
                </optgroup>
            </select>
            <button class="btn-add-member" onclick="addMember()">เพิ่ม</button>
        </div>
    </div>

    <div class="section-title">📋 Party — ลากสมาชิกจากคลังมาวางได้เลย</div>
    <div class="parties-wrap" id="partiesWrap"></div>

    <div class="pool-card">
        <div class="pool-header">
            <span>🎒 คลังสมาชิก</span>
            <span id="poolCount" style="font-size:0.8rem;color:#fca5a5;"></span>
        </div>
        <div class="pool-grid" id="poolGrid" ondragover="onDragOver(event,'pool')" ondragleave="onDragLeave(event,'pool')" ondrop="onDrop(event,'pool')">
            <span class="pool-empty" id="poolEmpty">ยังไม่มีสมาชิก</span>
        </div>
    </div>
</div>

<script>
var state = {
    parties: [
        { id: 'p1', name: 'Party 1', members: [] },
        { id: 'p2', name: 'Party 2', members: [] },
        { id: 'p3', name: 'Party 3', members: [] }
    ],
    pool: []
};
var dragInfo = null;
var partyRef = null;

window.onload = function () {
    // อัปเดตด้วย Config ตัวใหม่ที่คุณให้มาครับ
    var cfg = {
        apiKey: "AIzaSyDbWABEMg6W4W0gBu3oXQC67p5ilQbRY-o",
        authDomain: "party-20966.firebaseapp.com",
        databaseURL: "https://party-20966-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "party-20966",
        storageBucket: "party-20966.firebasestorage.app",
        messagingSenderId: "760995927532",
        appId: "1:760995927532:web:3b3b14f6b5271d8b155cc9",
        measurementId: "G-9NW21Z6WCB"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    partyRef = firebase.database().ref('guild_party2');

    partyRef.on('value', function (snap) {
        var d = snap.val();
        if (d) {
            if (d.parties && d.parties.length) state.parties = d.parties;
            state.pool = d.pool || [];
        }
        render();
        document.getElementById('cloudStatus').textContent = '☁️ Cloud Sync เชื่อมต่อแล้ว';
    });
};

function save() {
    if (!partyRef) return;
    partyRef.set({ parties: state.parties, pool: state.pool });
}

var ICON = { 'lord knight':'🛡️','paladin':'🛡️','assassin':'🗡️','stalker':'🥷','bard':'🎵','dancer':'💃','priest':'✝️','monk':'🥋','sniper':'🏹','wizard':'🔮','sage':'📖','biochemist':'🧪','mastersmith':'⚒️','summoner':'🌸','other':'⚔️' };
var CLS = { 'lord knight':'job-red','paladin':'job-red','assassin':'job-purple','stalker':'job-purple','bard':'job-yellow','dancer':'job-yellow','sniper':'job-yellow','priest':'job-green','monk':'job-blue','summoner':'job-pink','biochemist':'job-brown','mastersmith':'job-brown','wizard':'job-brown','sage':'job-brown' };
function jIcon(j) { return ICON[j.toLowerCase()] || '⚔️'; }
function jCls(j)  { return CLS[j.toLowerCase()]  || 'job-default'; }

function addMember() {
    var nameEl = document.getElementById('memberName');
    var jobEl  = document.getElementById('memberJob');
    var name = nameEl.value.trim();
    var job = jobEl.value;
    if (!name || !job) return;
    state.pool.push({ id: 'm' + Date.now() + Math.random().toString(36).slice(2, 5), name: name, job: job });
    nameEl.value = ''; jobEl.value = ''; nameEl.focus();
    render(); save();
}

function deleteMember(mid) {
    state.pool = state.pool.filter(function (m) { return m.id !== mid; });
    state.parties.forEach(function (p) { p.members = p.members.filter(function (m) { return m.id !== mid; }); });
    render(); save();
}

function deleteParty(pid) {
    if (!confirm('ลบ party นี้? สมาชิกจะถูกย้ายกลับคลัง')) return;
    var p = state.parties.find(function (x) { return x.id === pid; });
    if (p) state.pool = state.pool.concat(p.members);
    state.parties = state.parties.filter(function (x) { return x.id !== pid; });
    render(); save();
}

function addParty() {
    state.parties.push({ id: 'p' + Date.now(), name: 'Party ' + (state.parties.length + 1), members: [] });
    render(); save();
}

function editPartyName(pid) {
    document.getElementById('pname-' + pid).style.display = 'none';
    var inp = document.getElementById('pinput-' + pid);
    inp.style.display = 'block';
    inp.value = state.parties.find(function (p) { return p.id === pid; }).name;
    inp.focus(); inp.select();
}
function savePartyName(pid) {
    var inp = document.getElementById('pinput-' + pid);
    var val = inp.value.trim();
    if (val) state.parties.find(function (p) { return p.id === pid; }).name = val;
    document.getElementById('pname-' + pid).style.display = 'block';
    inp.style.display = 'none';
    save();
}

function onDragStart(ev, mid, src) {
    dragInfo = { mid: mid, src: src };
    ev.dataTransfer.effectAllowed = 'move';
    setTimeout(function () {
        var el = document.getElementById('chip-' + mid);
        if (el) el.classList.add('dragging');
    }, 0);
}
function onDragEnd(mid) {
    var el = document.getElementById('chip-' + mid);
    if (el) el.classList.remove('dragging');
}
function getDropEl(target) { return target === 'pool' ? document.getElementById('poolGrid') : document.getElementById('pbox-' + target); }
function onDragOver(ev, target) { ev.preventDefault(); var el = getDropEl(target); if (el) el.classList.add('drag-over'); }
function onDragLeave(ev, target) { var el = getDropEl(target); if (el) el.classList.remove('drag-over'); }
function onDrop(ev, target) {
    ev.preventDefault();
    onDragLeave(ev, target);
    if (!dragInfo) return;
    var mid = dragInfo.mid, src = dragInfo.src;
    dragInfo = null;
    if (src === target) return;
    var member = null;
    if (src === 'pool') {
        var i = state.pool.findIndex(function (m) { return m.id === mid; });
        if (i === -1) return;
        member = state.pool.splice(i, 1)[0];
    } else {
        var sp = state.parties.find(function (p) { return p.id === src; });
        if (!sp) return;
        var j = sp.members.findIndex(function (m) { return m.id === mid; });
        if (j === -1) return;
        member = sp.members.splice(j, 1)[0];
    }
    if (target === 'pool') { state.pool.push(member); } 
    else { var dp = state.parties.find(function (p) { return p.id === target; }); if (dp) dp.members.push(member); }
    render(); save();
}

function makeChip(m, src) {
    return '<div id="chip-' + m.id + '" class="chip ' + jCls(m.job) + '" draggable="true" ondragstart="onDragStart(event,\'' + m.id + '\',\'' + src + '\')" ondragend="onDragEnd(\'' + m.id + '\')">' +
        '<span class="chip-icon">' + jIcon(m.job) + '</span>' +
        '<div class="chip-info"><div class="chip-name">' + m.name + '</div><div class="chip-job">' + m.job + '</div></div>' +
        '<button class="chip-del" onclick="deleteMember(\'' + m.id + '\')">✕</button></div>';
}

function render() {
    var wrap = document.getElementById('partiesWrap');
    wrap.innerHTML = '';
    state.parties.forEach(function (party) {
        var inner = party.members.length === 0 ? '<div class="drop-hint">ลากสมาชิกมาวางที่นี่</div>' : party.members.map(function (m) { return makeChip(m, party.id); }).join('');
        wrap.innerHTML += '<div class="party-box" id="pbox-' + party.id + '" ondragover="onDragOver(event,\'' + party.id + '\')" ondragleave="onDragLeave(event,\'' + party.id + '\')" ondrop="onDrop(event,\'' + party.id + '\')">' +
            '<div class="party-header"><span class="party-name-display" id="pname-' + party.id + '" onclick="editPartyName(\'' + party.id + '\')">' + party.name + '</span>' +
            '<input class="party-name-input" id="pinput-' + party.id + '" onblur="savePartyName(\'' + party.id + '\')" onkeypress="if(event.key===\'Enter\')savePartyName(\'' + party.id + '\')">' +
            '<span class="party-count">' + party.members.length + ' คน</span><button class="btn-del-party" onclick="deleteParty(\'' + party.id + '\')">✕</button></div>' +
            '<div class="party-members">' + inner + '</div></div>';
    });
    wrap.innerHTML += '<button class="btn-add-party" onclick="addParty()">＋ เพิ่ม Party</button>';
    var grid = document.getElementById('poolGrid');
    var empty = document.getElementById('poolEmpty');
    Array.from(grid.querySelectorAll('.chip')).forEach(function (el) { el.remove(); });
    if (state.pool.length === 0) { empty.style.display = 'block'; } else { empty.style.display = 'none'; state.pool.forEach(function (m) { grid.insertAdjacentHTML('beforeend', makeChip(m, 'pool')); }); }
    document.getElementById('poolCount').textContent = state.pool.length > 0 ? state.pool.length + ' คน' : '';
}
</script>
</body>
</html>
