<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RO Guild - จัดตั้ง Party</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }

        /* Header */
        .header { text-align: center; background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 24px; border-bottom: 4px solid #7c3aed; }
        .header h1 { font-size: 1.5rem; margin-bottom: 6px; }
        .status-cloud { font-size: 0.7rem; color: #10b981; margin-bottom: 8px; }
        .btn-back { display: inline-block; background: #334155; color: #f1f5f9; font-weight: bold; border: none; border-radius: 8px; padding: 8px 18px; cursor: pointer; font-size: 0.9rem; text-decoration: none; }

        /* Add form */
        .add-card { background: var(--card); padding: 18px 20px; border-radius: 12px; margin-bottom: 24px; border: 1px solid #334155; }
        .add-card h2 { color: #a78bfa; margin-bottom: 14px; font-size: 1rem; }
        .add-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .add-row input, .add-row select { flex: 1; min-width: 140px; padding: 10px 13px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; font-size: 0.95rem; }
        .btn-add-member { background: #7c3aed; color: white; font-weight: bold; border: none; border-radius: 8px; padding: 10px 22px; cursor: pointer; white-space: nowrap; }
        .btn-add-member:hover { background: #6d28d9; }

        /* Parties section */
        .section-title { font-size: 0.85rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
        .parties-wrap { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; align-items: flex-start; }

        .party-box { background: var(--card); border-radius: 12px; border: 2px solid #334155; min-width: 220px; width: 220px; transition: border-color 0.2s; }
        .party-box.drag-over { border-color: #7c3aed; background: #1e1b4b; }

        .party-header { padding: 10px 12px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; gap: 6px; }
        .party-name-display { font-weight: bold; color: #a78bfa; cursor: pointer; flex: 1; font-size: 0.95rem; }
        .party-name-display:hover { text-decoration: underline; }
        .party-name-input { flex: 1; background: #0f172a; border: 1px solid #7c3aed; color: white; border-radius: 5px; padding: 3px 7px; font-size: 0.9rem; outline: none; display: none; }
        .party-count { font-size: 0.75rem; color: #64748b; white-space: nowrap; }
        .btn-del-party { background: none; border: none; color: #475569; cursor: pointer; font-size: 0.85rem; padding: 0 2px; }
        .btn-del-party:hover { color: #ef4444; }

        .party-members { min-height: 60px; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .drop-hint { color: #334155; font-size: 0.8rem; text-align: center; padding: 12px 0; border: 2px dashed #334155; border-radius: 8px; user-select: none; }

        /* Add party button */
        .btn-add-party { background: #1e293b; border: 2px dashed #334155; color: #64748b; border-radius: 12px; min-width: 110px; padding: 20px 16px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 6px; align-self: center; }
        .btn-add-party:hover { border-color: #7c3aed; color: #a78bfa; }

        /* Member chip */
        .chip { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; cursor: grab; transition: opacity 0.15s, transform 0.15s; border: 1px solid transparent; user-select: none; }
        .chip:active { cursor: grabbing; }
        .chip.dragging { opacity: 0.4; }
        .chip-icon { font-size: 1.1rem; flex-shrink: 0; }
        .chip-info { flex: 1; min-width: 0; }
        .chip-name { font-size: 0.9rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chip-job  { font-size: 0.72rem; opacity: 0.7; }
        .chip-del  { background: none; border: none; color: #475569; cursor: pointer; font-size: 0.8rem; padding: 0 2px; flex-shrink: 0; }
        .chip-del:hover { color: #ef4444; }

        /* Job colors */
        .job-purple  { background: #2e1065; border-color: #7c3aed !important; }
        .job-yellow  { background: #3b2000; border-color: #d97706 !important; }
        .job-green   { background: #052e16; border-color: #16a34a !important; }
        .job-pink    { background: #4a044e; border-color: #d946ef !important; }
        .job-brown   { background: #1c0a00; border-color: #92400e !important; }
        .job-default { background: #1e293b; border-color: #475569 !important; }

        /* Pool */
        .pool-card { background: var(--card); border-radius: 12px; border: 1px solid #334155; overflow: hidden; }
        .pool-header { padding: 12px 16px; background: #1e3a5f; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .pool-header span { font-weight: bold; color: #7dd3fc; font-size: 0.95rem; }
        .pool-grid { display: flex; flex-wrap: wrap; gap: 8px; padding: 14px; min-height: 80px; }
        .pool-grid.drag-over { background: #1e1b4b; }
        .pool-empty { color: #334155; font-size: 0.85rem; padding: 8px; }

        /* Drag ghost fix */
        [draggable="true"] { -webkit-user-drag: element; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚔️ จัดตั้ง Party กิลด์</h1>
        <div class="status-cloud">☁️ Cloud Sync</div>
        <a href="index.html" class="btn-back">← กลับหน้าคิวประมูล</a>
    </div>

    <!-- Add member -->
    <div class="add-card">
        <h2>➕ เพิ่มสมาชิกลงคลัง</h2>
        <div class="add-row">
            <input type="text" id="memberName" placeholder="ชื่อตัวละคร..." onkeypress="if(event.key==='Enter') addMember()">
            <select id="memberJob">
                <option value="">-- เลือกอาชีพ --</option>
                <optgroup label="🗡️ Thief">
                    <option value="Assassin">Assassin</option>
                    <option value="Stalker">Stalker</option>
                </optgroup>
                <optgroup label="🎵 Support">
                    <option value="Bard">Bard</option>
                    <option value="Dancer">Dancer</option>
                    <option value="Priest">Priest</option>
                    <option value="Monk">Monk</option>
                </optgroup>
                <optgroup label="🏹 Ranged">
                    <option value="Sniper">Sniper</option>
                </optgroup>
                <optgroup label="✨ Magic">
                    <option value="Wizard">Wizard</option>
                    <option value="Sage">Sage</option>
                </optgroup>
                <optgroup label="⚒️ Creator">
                    <option value="Biochemist">Biochemist</option>
                    <option value="Mastersmith">Mastersmith</option>
                </optgroup>
                <optgroup label="🌸 Other">
                    <option value="Summoner">Summoner</option>
                    <option value="Other">Other</option>
                </optgroup>
            </select>
            <button class="btn-add-member" onclick="addMember()">เพิ่ม</button>
        </div>
    </div>

    <!-- Parties -->
    <div class="section-title">📋 Party — ลากสมาชิกจากคลังมาวางได้เลย</div>
    <div class="parties-wrap" id="partiesWrap"></div>

    <!-- Pool -->
    <div class="pool-card">
        <div class="pool-header">
            <span>🎒 คลังสมาชิก</span>
            <span id="poolCount" style="font-size:0.8rem;color:#94a3b8;"></span>
        </div>
        <div class="pool-grid" id="poolGrid"
            ondragover="onDragOver(event,'pool')"
            ondragleave="onDragLeave(event,'pool')"
            ondrop="onDrop(event,'pool')">
            <span class="pool-empty" id="poolEmpty">ยังไม่มีสมาชิก</span>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBYrNg9viyiItkFuNes3Bn2yqv4E82ubVs",
    authDomain: "ro-guild-queue.firebaseapp.com",
    databaseURL: "https://ro-guild-queue-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ro-guild-queue",
    storageBucket: "ro-guild-queue.firebasestorage.app",
    messagingSenderId: "506020314747",
    appId: "1:506020314747:web:d2afa06df8fd6179f32cde"
};
firebase.initializeApp(firebaseConfig);
const partyRef = firebase.database().ref('guild_party2');

let state = {
    parties: [
        { id: 'p1', name: 'Party 1', members: [] },
        { id: 'p2', name: 'Party 2', members: [] },
        { id: 'p3', name: 'Party 3', members: [] }
    ],
    pool: []
};

let dragInfo = null; // { memberId, source }

// ─── Firebase sync ───────────────────────────────────────────
partyRef.on('value', snap => {
    const d = snap.val();
    if (d) {
        state.parties = d.parties || state.parties;
        state.pool = d.pool || [];
    }
    render();
});

function save() {
    partyRef.set({ parties: state.parties, pool: state.pool });
}

// ─── Job helpers ─────────────────────────────────────────────
const JOB_ICON = {
    assassin:'🗡️', stalker:'🥷', bard:'🎵', dancer:'💃',
    priest:'✝️', monk:'🥋', sniper:'🏹', wizard:'🔮',
    sage:'📖', biochemist:'🧪', mastersmith:'⚒️', summoner:'🌸', other:'⚔️'
};
const JOB_CLASS = {
    assassin:'job-purple', stalker:'job-purple',
    bard:'job-yellow', dancer:'job-yellow', sniper:'job-yellow',
    priest:'job-green', monk:'job-green',
    summoner:'job-pink',
    biochemist:'job-brown', mastersmith:'job-brown',
    wizard:'job-brown', sage:'job-brown'
};
function jobIcon(job)  { return JOB_ICON[job.toLowerCase()] || '⚔️'; }
function jobClass(job) { return JOB_CLASS[job.toLowerCase()] || 'job-default'; }

// ─── Add member ──────────────────────────────────────────────
function addMember() {
    const nameEl = document.getElementById('memberName');
    const jobEl  = document.getElementById('memberJob');
    const name = nameEl.value.trim();
    const job  = jobEl.value;
    if (!name) { nameEl.focus(); return; }
    if (!job)  { jobEl.focus();  return; }
    state.pool.push({ id: 'u' + Date.now() + Math.random().toString(36).slice(2,6), name, job });
    nameEl.value = '';
    jobEl.value  = '';
    nameEl.focus();
    save();
}

// ─── Delete ──────────────────────────────────────────────────
function deleteMember(memberId) {
    state.pool = state.pool.filter(m => m.id !== memberId);
    state.parties.forEach(p => { p.members = p.members.filter(m => m.id !== memberId); });
    save();
}

function deleteParty(partyId) {
    if (!confirm('ลบ party นี้? สมาชิกจะถูกย้ายกลับคลัง')) return;
    const party = state.parties.find(p => p.id === partyId);
    if (party) state.pool.push(...party.members);
    state.parties = state.parties.filter(p => p.id !== partyId);
    save();
}

function addParty() {
    const n = state.parties.length + 1;
    state.parties.push({ id: 'p' + Date.now(), name: 'Party ' + n, members: [] });
    save();
}

// ─── Party name edit ─────────────────────────────────────────
function editPartyName(partyId) {
    const display = document.getElementById('pname-' + partyId);
    const input   = document.getElementById('pinput-' + partyId);
    display.style.display = 'none';
    input.style.display   = 'block';
    input.value = state.parties.find(p => p.id === partyId).name;
    input.focus();
    input.select();
}

function savePartyName(partyId) {
    const input = document.getElementById('pinput-' + partyId);
    const val   = input.value.trim();
    if (val) state.parties.find(p => p.id === partyId).name = val;
    document.getElementById('pname-' + partyId).style.display = 'block';
    input.style.display = 'none';
    save();
}

// ─── Drag & Drop ─────────────────────────────────────────────
function onDragStart(event, memberId, source) {
    dragInfo = { memberId, source };
    event.dataTransfer.effectAllowed = 'move';
    setTimeout(() => {
        const el = document.getElementById('chip-' + memberId);
        if (el) el.classList.add('dragging');
    }, 0);
}

function onDragEnd(memberId) {
    const el = document.getElementById('chip-' + memberId);
    if (el) el.classList.remove('dragging');
}

function onDragOver(event, target) {
    event.preventDefault();
    event.dataTransfer.dropEffect = 'move';
    const el = target === 'pool'
        ? document.getElementById('poolGrid')
        : document.getElementById('party-' + target);
    if (el) el.classList.add('drag-over');
}

function onDragLeave(event, target) {
    const el = target === 'pool'
        ? document.getElementById('poolGrid')
        : document.getElementById('party-' + target);
    if (el) el.classList.remove('drag-over');
}

function onDrop(event, target) {
    event.preventDefault();
    onDragLeave(event, target);
    if (!dragInfo) return;

    const { memberId, source } = dragInfo;
    dragInfo = null;

    // ถ้า drop ที่เดิม ไม่ต้องทำอะไร
    if (source === target) return;

    // หา member object
    let member = null;
    if (source === 'pool') {
        const idx = state.pool.findIndex(m => m.id === memberId);
        if (idx === -1) return;
        member = state.pool.splice(idx, 1)[0];
    } else {
        const srcParty = state.parties.find(p => p.id === source);
        if (!srcParty) return;
        const idx = srcParty.members.findIndex(m => m.id === memberId);
        if (idx === -1) return;
        member = srcParty.members.splice(idx, 1)[0];
    }

    // วาง member ที่ปลายทาง
    if (target === 'pool') {
        state.pool.push(member);
    } else {
        const dstParty = state.parties.find(p => p.id === target);
        if (!dstParty) return;
        dstParty.members.push(member);
    }

    save();
}

// ─── Render ──────────────────────────────────────────────────
function chipHTML(member, source) {
    const cls  = jobClass(member.job);
    const icon = jobIcon(member.job);
    return `<div id="chip-${member.id}" class="chip ${cls}"
        draggable="true"
        ondragstart="onDragStart(event,'${member.id}','${source}')"
        ondragend="onDragEnd('${member.id}')">
        <span class="chip-icon">${icon}</span>
        <div class="chip-info">
            <div class="chip-name">${member.name}</div>
            <div class="chip-job">${member.job}</div>
        </div>
        <button class="chip-del" onclick="deleteMember('${member.id}')" title="ลบ">✕</button>
    </div>`;
}

function render() {
    // Parties
    const wrap = document.getElementById('partiesWrap');
    wrap.innerHTML = '';
    state.parties.forEach(party => {
        const membersHTML = party.members.length === 0
            ? '<div class="drop-hint">ลากสมาชิกมาวางที่นี่</div>'
            : party.members.map(m => chipHTML(m, party.id)).join('');

        wrap.innerHTML += `
        <div class="party-box" id="party-${party.id}"
            ondragover="onDragOver(event,'${party.id}')"
            ondragleave="onDragLeave(event,'${party.id}')"
            ondrop="onDrop(event,'${party.id}')">
            <div class="party-header">
                <span class="party-name-display" id="pname-${party.id}"
                    onclick="editPartyName('${party.id}')" title="คลิกเพื่อแก้ไขชื่อ">${party.name}</span>
                <input class="party-name-input" id="pinput-${party.id}"
                    onblur="savePartyName('${party.id}')"
                    onkeypress="if(event.key==='Enter') savePartyName('${party.id}')">
                <span class="party-count">${party.members.length} คน</span>
                <button class="btn-del-party" onclick="deleteParty('${party.id}')" title="ลบ party">✕</button>
            </div>
            <div class="party-members">${membersHTML}</div>
        </div>`;
    });

    // Add party button
    wrap.innerHTML += `<button class="btn-add-party" onclick="addParty()">＋ เพิ่ม Party</button>`;

    // Pool
    const poolGrid  = document.getElementById('poolGrid');
    const poolEmpty = document.getElementById('poolEmpty');
    const existingChips = poolGrid.querySelectorAll('.chip');
    existingChips.forEach(el => el.remove());
    if (poolEmpty) poolEmpty.style.display = state.pool.length === 0 ? 'block' : 'none';
    state.pool.forEach(m => {
        poolGrid.insertAdjacentHTML('beforeend', chipHTML(m, 'pool'));
    });
    document.getElementById('poolCount').textContent =
        state.pool.length > 0 ? `${state.pool.length} คน` : '';
}
</script>
</body>
</html>
