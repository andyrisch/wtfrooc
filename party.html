<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RO Guild Party - Fixed v1.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0d0d0d; --card: #1a1a1a; --text: #f1f5f9; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        
        .header { text-align: center; color: #dc2626; margin-bottom: 10px; }
        .control-panel { background: var(--card); padding: 15px; border-radius: 10px; display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; border: 1px solid #333; }
        
        input, select, button { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; }
        .btn-red { background: #dc2626; border: none; cursor: pointer; font-weight: bold; }
        .btn-blue { background: #2563eb; border: none; cursor: pointer; font-weight: bold; padding: 10px 30px; margin: 0 auto 20px; display: block; }
        .btn-back { background: #475569; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* สีอาชีพ */
        .job-red { border-left: 5px solid #ff4444; background: #441111; }
        .job-blue { border-left: 5px solid #44aaff; background: #112244; }
        .job-pink { border-left: 5px solid #ff44aa; background: #441133; }
        .job-purple { border-left: 5px solid #aa44ff; background: #331144; }
        .job-brown { border-left: 5px solid #ffaa44; background: #443311; }
        .job-yellow { border-left: 5px solid #ffff44; background: #444411; }
        .job-green { border-left: 5px solid #44ffaa; background: #114422; }

        .party-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .party-box { background: var(--card); border: 2px solid #333; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
        .party-header { background: #333; padding: 10px; display: flex; justify-content: space-between; font-weight: bold; }
        .party-members { padding: 10px; min-height: 100px; display: flex; flex-direction: column; gap: 5px; }

        .member-chip { padding: 8px; border-radius: 4px; display: flex; justify-content: space-between; font-size: 0.85rem; }
        .pool-section { background: #111; padding: 15px; border-radius: 10px; border: 1px dashed #555; }
        .pool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>

<h2 class="header">⚔️ RO PARTY MANAGER</h2>

<div style="text-align: center; margin-bottom: 20px;">
    <a href="index.html" style="text-decoration: none;">
        <button class="btn-back">🔙 กลับหน้าประมูลของ</button>
    </a>
</div>

<div class="control-panel">
    <input type="text" id="nameIn" placeholder="ชื่อตัวละคร...">
    <select id="jobIn">
        <option value="Lord Knight">Lord Knight (แดง)</option>
        <option value="Paladin">Paladin (แดง)</option>
        <option value="Wizard">Wizard (ฟ้า)</option>
        <option value="Sage">Sage (ฟ้า)</option>
        <option value="Summoner">Summoner (ชมพู)</option>
        <option value="Assassin">Assassin (ม่วง)</option>
        <option value="Stalker">Stalker (ม่วง)</option>
        <option value="Mastersmith">Mastersmith (น้ำตาล)</option>
        <option value="Biochemist">Biochemist (น้ำตาล)</option>
        <option value="Sniper">Sniper (เหลือง)</option>
        <option value="Bard">Bard (เหลือง)</option>
        <option value="Dancer">Dancer (เหลือง)</option>
        <option value="Priest">Priest (เขียว)</option>
        <option value="Monk">Monk (เขียว)</option>
    </select>
    <button class="btn-red" onclick="addMember()">➕ เพิ่มสมาชิก</button>
</div>

<button class="btn-blue" onclick="addParty()">⚔️ สร้างปาร์ตี้ใหม่</button>

<div class="party-grid" id="pDisplay"></div>

<div class="pool-section">
    <h3 style="color:#888; margin-top:0;">🎒 คลังสมาชิก (<span id="count">0</span>)</h3>
    <div class="pool-grid" id="poolDisplay"></div>
</div>

<script>
    // การตั้งค่า Firebase คงเดิม
    const firebaseConfig = {
        apiKey: "AIzaSyDbWABEMg6W4W0gBu3oXQC67p5ilQbRY-o",
        authDomain: "party-20966.firebaseapp.com",
        databaseURL: "https://party-20966-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "party-20966",
        storageBucket: "party-20966.firebasestorage.app",
        messagingSenderId: "760995927532",
        appId: "1:760995927532:web:3b3b14f6b5271d8b155cc9"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database().ref('party_v_stable');

    let localState = { pool: [], parties: [] };

    database.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            localState.pool = data.pool || [];
            localState.parties = data.parties || [];
        } else {
            localState = { pool: [], parties: [] };
        }
        renderUI();
    });

    function saveToFirebase() {
        database.set(localState);
    }

    function addMember() {
        const n = document.getElementById('nameIn').value.trim();
        const j = document.getElementById('jobIn').value;
        if (!n) return alert("ใส่ชื่อด้วยครับ");
        localState.pool.push({ id: Date.now().toString(), name: n, job: j });
        document.getElementById('nameIn').value = "";
        saveToFirebase();
    }

    function addParty() {
        if (!localState.parties) localState.parties = [];
        localState.parties.push({ id: 'p' + Date.now(), members: [] });
        saveToFirebase();
    }

    function moveMemberToParty(partyId) {
        const select = document.getElementById(`sel-${partyId}`);
        const memberId = select.value;
        if (!memberId) return;
        const pIdx = localState.parties.findIndex(p => p.id === partyId);
        if (localState.parties[pIdx].members && localState.parties[pIdx].members.length >= 5) {
            return alert("เต็ม 5 คนแล้ว");
        }
        const mIdx = localState.pool.findIndex(m => m.id === memberId);
        const member = localState.pool.splice(mIdx, 1)[0];
        if (!localState.parties[pIdx].members) localState.parties[pIdx].members = [];
        localState.parties[pIdx].members.push(member);
        saveToFirebase();
    }

    function returnToPool(partyId, memberId) {
        const pIdx = localState.parties.findIndex(p => p.id === partyId);
        const mIdx = localState.parties[pIdx].members.findIndex(m => m.id === memberId);
        const member = localState.parties[pIdx].members.splice(mIdx, 1)[0];
        localState.pool.push(member);
        saveToFirebase();
    }

    function deleteParty(pid) {
        if (!confirm("ลบปาร์ตี้? (ชื่อจะกลับคลัง)")) return;
        const pIdx = localState.parties.findIndex(p => p.id === pid);
        if (localState.parties[pIdx].members) {
            localState.pool.push(...localState.parties[pIdx].members);
        }
        localState.parties.splice(pIdx, 1);
        saveToFirebase();
    }

    function getJobClass(job) {
        if (['Lord Knight', 'Paladin'].includes(job)) return 'job-red';
        if (['Wizard', 'Sage'].includes(job)) return 'job-blue';
        if (job === 'Summoner') return 'job-pink';
        if (['Assassin', 'Stalker'].includes(job)) return 'job-purple';
        if (['Mastersmith', 'Biochemist'].includes(job)) return 'job-brown';
        if (['Sniper', 'Bard', 'Dancer'].includes(job)) return 'job-yellow';
        return 'job-green';
    }

    function renderUI() {
        const pDisplay = document.getElementById('pDisplay');
        pDisplay.innerHTML = localState.parties.map((p, i) => `
            <div class="party-box">
                <div class="party-header">
                    <span>PARTY ${i + 1}</span>
                    <button onclick="deleteParty('${p.id}')" style="color:red; background:none; border:none; cursor:pointer;">✕</button>
                </div>
                <div class="party-members">
                    ${(p.members || []).map(m => `
                        <div class="member-chip ${getJobClass(m.job)}">
                            ${m.name}
                            <button onclick="returnToPool('${p.id}', '${m.id}')" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
                        </div>
                    `).join('')}
                </div>
                <div style="padding:10px; display:flex; gap:5px; background:#222;">
                    <select id="sel-${p.id}" style="flex-grow:1; font-size:12px;">
                        <option value="">-- เลือก --</option>
                        ${localState.pool.map(m => `<option value="${m.id}">${m.name}</option>`).join('')}
                    </select>
                    <button onclick="moveMemberToParty('${p.id}')" style="background:green; border:none; color:white;">➕</button>
                </div>
            </div>
        `).join('');

        const poolDisplay = document.getElementById('poolDisplay');
        poolDisplay.innerHTML = localState.pool.map(m => `
            <div class="member-chip ${getJobClass(m.job)}">
                ${m.name}
            </div>
        `).join('');
        document.getElementById('count').innerText = localState.pool.length;
    }
</script>
</body>
</html>
