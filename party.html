<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RO Guild Party Builder</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0d0d0d; --card: #1a1a1a; --text: #f1f5f9; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        
        /* Form Section */
        .form-area { background: var(--card); padding: 20px; border-radius: 12px; display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; border: 1px solid #333; }
        input, select, button { padding: 10px; border-radius: 6px; border: 1px solid #444; background: #000; color: #fff; }
        .btn-add { background: #dc2626; border: none; cursor: pointer; font-weight: bold; }
        .btn-party { background: #2563eb; border: none; cursor: pointer; display: block; margin: 0 auto 20px; padding: 10px 30px; font-weight: bold; }

        /* Party Grid */
        .party-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .party-box { background: var(--card); border: 2px solid #333; border-radius: 12px; min-height: 250px; display: flex; flex-direction: column; }
        .party-box.drag-over { border-color: #dc2626; background: #222; }
        .party-header { background: #333; padding: 10px; text-align: center; font-weight: bold; border-radius: 10px 10px 0 0; }
        .party-members { padding: 10px; flex-grow: 1; min-height: 180px; display: flex; flex-direction: column; gap: 8px; }

        /* Member Chips */
        .chip { padding: 10px; border-radius: 8px; cursor: grab; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); font-size: 0.9rem; }
        .chip:active { cursor: grabbing; }
        .chip.dragging { opacity: 0.4; }

        /* Job Colors */
        .job-red { background: #991b1b; border-left: 5px solid #ef4444; }
        .job-blue { background: #1e40af; border-left: 5px solid #60a5fa; }
        .job-pink { background: #9d174d; border-left: 5px solid #f472b6; }
        .job-purple { background: #6b21a8; border-left: 5px solid #a78bfa; }
        .job-brown { background: #713f12; border-left: 5px solid #fbbf24; }
        .job-yellow { background: #854d0e; border-left: 5px solid #fde047; }
        .job-green { background: #065f46; border-left: 5px solid #34d399; }

        /* Pool Area */
        .pool-section { background: #111; padding: 20px; border-radius: 15px; border: 2px dashed #444; }
        .pool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; max-height: 300px; overflow-y: auto; padding: 10px; }
    </style>
</head>
<body>

<div class="form-area">
    <input type="text" id="inName" placeholder="ชื่อตัวละคร...">
    <select id="inJob">
        <option value="">-- เลือกอาชีพ --</option>
        <option value="Lord Knight">Tank: Lord Knight (แดง)</option>
        <option value="Paladin">Tank: Paladin (แดง)</option>
        <option value="Wizard">Magic: Wizard (ฟ้า)</option>
        <option value="Sage">Magic: Sage (ฟ้า)</option>
        <option value="Summoner">Other: Summoner (ชมพู)</option>
        <option value="Assassin">DPS: Assassin (ม่วง)</option>
        <option value="Stalker">DPS: Stalker (ม่วง)</option>
        <option value="Mastersmith">DPS: Mastersmith (น้ำตาล)</option>
        <option value="Biochemist">DPS: Biochemist (น้ำตาล)</option>
        <option value="Sniper">DPS: Sniper (เหลือง)</option>
        <option value="Bard">Support: Bard (เหลือง)</option>
        <option value="Dancer">Support: Dancer (เหลือง)</option>
        <option value="Priest">Support: Priest (เขียว)</option>
        <option value="Monk">Support: Monk (เขียว)</option>
    </select>
    <button class="btn-add" onclick="addNewMember()">➕ เพิ่มสมาชิก</button>
</div>

<button class="btn-party" onclick="addNewParty()">⚔️ สร้างปาร์ตี้ใหม่</button>

<div class="party-grid" id="pGrid"></div>

<div class="pool-section" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'pool')">
    <h3 style="margin:0 0 10px 0; color:#888;">🎒 คลังสมาชิก (ลากชื่อจากที่นี่ไปใส่ปาร์ตี้)</h3>
    <div class="pool-grid" id="poolArea"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDbWABEMg6W4W0gBu3oXQC67p5ilQbRY-o",
        authDomain: "party-20966.firebaseapp.com",
        databaseURL: "https://party-20966-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "party-20966",
        storageBucket: "party-20966.firebasestorage.app",
        messagingSenderId: "760995927532",
        appId: "1:760995927532:web:3b3b14f6b5271d8b155cc9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('ro_party_system');

    let state = { pool: [], parties: [] };

    // --- Firebase Sync ---
    window.onload = () => {
        db.on('value', snap => {
            const val = snap.val();
            if (val) {
                state.pool = val.pool || [];
                state.parties = val.parties || [];
                render();
            }
        });
    };

    function save() { db.set(state); }

    // --- Actions ---
    function addNewMember() {
        const name = document.getElementById('inName').value.trim();
        const job = document.getElementById('inJob').value;
        if (!name || !job) return alert("กรุณากรอกข้อมูลให้ครบ");
        state.pool.push({ id: 'm' + Date.now(), name, job });
        document.getElementById('inName').value = "";
        save();
    }

    function addNewParty() {
        state.parties.push({ id: 'p' + Date.now(), members: [] });
        save();
    }

    function deleteParty(pid) {
        if (!confirm("ลบปาร์ตี้นี้?")) return;
        const idx = state.parties.findIndex(p => p.id === pid);
        if (state.parties[idx].members) state.pool.push(...state.parties[idx].members);
        state.parties.splice(idx, 1);
        save();
    }

    // --- Drag & Drop ENGINE ---
    function allowDrop(ev) {
        ev.preventDefault(); // บังคับให้เบราเซอร์อนุญาตให้วาง
        ev.currentTarget.classList.add('drag-over');
    }

    function onDragStart(ev, mid, fromId) {
        ev.dataTransfer.setData("mid", mid);
        ev.dataTransfer.setData("from", fromId);
    }

    function handleDrop(ev, toId) {
        ev.preventDefault();
        document.querySelectorAll('.party-box, .pool-section').forEach(el => el.classList.remove('drag-over'));
        
        const mid = ev.dataTransfer.getData("mid");
        const fromId = ev.dataTransfer.getData("from");

        if (!mid || fromId === toId) return;

        // 1. ดึงสมาชิกออกจากต้นทาง
        let memberObj;
        if (fromId === 'pool') {
            const idx = state.pool.findIndex(m => m.id === mid);
            memberObj = state.pool.splice(idx, 1)[0];
        } else {
            const pIdx = state.parties.findIndex(p => p.id === fromId);
            const mIdx = state.parties[pIdx].members.findIndex(m => m.id === mid);
            memberObj = state.parties[pIdx].members.splice(mIdx, 1)[0];
        }

        // 2. ใส่สมาชิกเข้าปลายทาง
        if (toId === 'pool') {
            state.pool.push(memberObj);
        } else {
            const pIdx = state.parties.findIndex(p => p.id === toId);
            if (state.parties[pIdx].members.length >= 5) {
                alert("ปาร์ตี้เต็มแล้ว (5 คน)");
                // คืนที่เดิม
                if (fromId === 'pool') state.pool.push(memberObj);
                else state.parties[state.parties.findIndex(p => p.id === fromId)].members.push(memberObj);
            } else {
                state.parties[pIdx].members.push(memberObj);
            }
        }
        save();
    }

    // --- UI Render ---
    function getJobClass(j) {
        if (['Lord Knight', 'Paladin'].includes(j)) return 'job-red';
        if (['Wizard', 'Sage'].includes(j)) return 'job-blue';
        if (j === 'Summoner') return 'job-pink';
        if (['Assassin', 'Stalker'].includes(j)) return 'job-purple';
        if (['Mastersmith', 'Biochemist'].includes(j)) return 'job-brown';
        if (['Sniper', 'Bard', 'Dancer'].includes(j)) return 'job-yellow';
        if (['Monk', 'Priest'].includes(j)) return 'job-green';
        return '';
    }

    function render() {
        // Render Parties
        const pGrid = document.getElementById('pGrid');
        pGrid.innerHTML = state.parties.map((p, index) => `
            <div class="party-box" ondragover="allowDrop(event)" ondragleave="this.classList.remove('drag-over')" ondrop="handleDrop(event, '${p.id}')">
                <div class="party-header">
                    <span>PARTY ${index + 1}</span>
                    <button onclick="deleteParty('${p.id}')" style="float:right; background:none; border:none; color:red; cursor:pointer;">✕</button>
                    <div style="font-size:0.7rem; color:#888;">${p.members ? p.members.length : 0}/5</div>
                </div>
                <div class="party-members">
                    ${(p.members || []).map(m => `
                        <div class="chip ${getJobClass(m.job)}" draggable="true" ondragstart="onDragStart(event, '${m.id}', '${p.id}')">
                            <span><b>${m.name}</b><br><small>${m.job}</small></span>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');

        // Render Pool
        const pArea = document.getElementById('poolArea');
        pArea.innerHTML = state.pool.map(m => `
            <div class="chip ${getJobClass(m.job)}" draggable="true" ondragstart="onDragStart(event, '${m.id}', 'pool')">
                <span><b>${m.name}</b><br><small>${m.job}</small></span>
            </div>
        `).join('');
    }
</script>

</body>
</html>
