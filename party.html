<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RO Guild - Party System (Fixed)</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #1a0000; --card: #2a0a0a; --text: #f1f5f9; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg); color: var(--text); padding: 20px; text-align: center; }
        .header { background: #3b0000; padding: 20px; border-radius: 12px; border-bottom: 4px solid #dc2626; margin-bottom: 20px; }
        .status-bar { padding: 10px; margin-bottom: 15px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; }
        .online { background: #065f46; color: #10b981; }
        .offline { background: #450a0a; color: #f87171; }
        .input-group { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #7f1d1d; display: inline-block; }
        input, select { padding: 10px; border-radius: 5px; border: 1px solid #7f1d1d; background: #000; color: #fff; margin: 5px; outline: none; }
        button { padding: 10px 25px; background: #dc2626; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ef4444; }
        #poolGrid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; min-height: 100px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 10px; }
        .chip { background: #3b0000; padding: 8px 15px; border-radius: 20px; border: 1px solid #ef4444; }
    </style>
</head>
<body>

<div class="header">
    <h1>⚔️ ระบบจัดปาร์ตี้กิลด์</h1>
    <div id="connectionStatus" class="status-bar offline">🔴 ตรวจสอบสถานะการเชื่อมต่อ...</div>
</div>

<div class="input-group">
    <input type="text" id="charName" placeholder="ชื่อตัวละคร...">
    <select id="charJob">
        <option value="">-- เลือกอาชีพ --</option>
        <option value="Lord Knight">Lord Knight</option>
        <option value="Paladin">Paladin</option>
        <option value="High Priest">High Priest</option>
        <option value="Sniper">Sniper</option>
        <option value="High Wizard">High Wizard</option>
    </select>
    <button onclick="addMember()">➕ เพิ่มสมาชิก</button>
</div>

<div id="poolGrid">
    <div style="color: #666;">ยังไม่มีสมาชิกในรายการ</div>
</div>

<script>
    // --- ตั้งค่าระบบ ---
    var state = { pool: [] };
    var partyRef = null;

    const firebaseConfig = {
        apiKey: "AIzaSyDbWABEMg6W4W0gBu3oXQC67p5ilQbRY-o",
        authDomain: "party-20966.firebaseapp.com",
        databaseURL: "https://party-20966-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "party-20966",
        storageBucket: "party-20966.firebasestorage.app",
        messagingSenderId: "760995927532",
        appId: "1:760995927532:web:3b3b14f6b5271d8b155cc9"
    };

    // 1. เริ่มทำงานเมื่อเปิดหน้าเว็บ
    window.onload = function() {
        try {
            firebase.initializeApp(firebaseConfig);
            partyRef = firebase.database().ref('guild_party2');

            // ตรวจสอบสถานะ Online
            firebase.database().ref(".info/connected").on("value", function(snap) {
                var status = document.getElementById('connectionStatus');
                if (snap.val() === true) {
                    status.className = "status-bar online";
                    status.innerHTML = "🟢 เชื่อมต่อ Cloud สำเร็จ! (พร้อมใช้งาน)";
                } else {
                    status.className = "status-bar offline";
                    status.innerHTML = "🔴 ตัดการเชื่อมต่อ! (เช็กอินเทอร์เน็ตหรือ Rules)";
                }
            });

            // ดึงข้อมูลมาแสดง
            partyRef.on('value', function(snap) {
                var d = snap.val();
                if (d && d.pool) {
                    state.pool = d.pool;
                }
                render();
            });
        } catch (e) {
            alert("Firebase Error: " + e.message);
        }
    };

    // 2. ฟังก์ชันกดปุ่ม "เพิ่ม"
    function addMember() {
        try {
            var name = document.getElementById('charName').value.trim();
            var job = document.getElementById('charJob').value;

            if (!name || !job) {
                alert("กรุณาใส่ชื่อและอาชีพครับ!");
                return;
            }

            // เพิ่มเข้า List ในเครื่อง
            state.pool.push({
                id: 'm' + Date.now(),
                name: name,
                job: job
            });

            // อัปเดตหน้าจอทันที
            render();
            
            // ส่งขึ้น Cloud
            save();

            // ล้างช่องกรอก
            document.getElementById('charName').value = "";
        } catch (e) {
            alert("Error ในการกดเพิ่ม: " + e.message);
            console.error(e);
        }
    }

    // 3. ฟังก์ชันบันทึกลง Firebase
    function save() {
        if (!partyRef) {
            alert("เชื่อมต่อ Database ไม่ได้");
            return;
        }
        
        partyRef.set({
            pool: state.pool,
            last_update: new Date().getTime()
        }).then(function() {
            console.log("บันทึกสำเร็จ!");
        }).catch(function(err) {
            alert("Firebase เขียนข้อมูลไม่ได้: " + err.message + "\n(กรุณาเช็ก Rules ใน Console)");
        });
    }

    // 4. ฟังก์ชันวาดหน้าจอ
    function render() {
        var grid = document.getElementById('poolGrid');
        if (!grid) return;

        if (state.pool.length === 0) {
            grid.innerHTML = '<div style="color: #666;">ยังไม่มีสมาชิกในรายการ</div>';
            return;
        }

        var html = '';
        state.pool.forEach(function(m) {
            html += '<div class="chip">' + m.name + ' (' + m.job + ')</div>';
        });
        grid.innerHTML = html;
    }
</script>

</body>
</html>
