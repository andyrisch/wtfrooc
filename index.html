<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTF - Guild System</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2d2822;
            --gold: #d4af37;
            --border: #5c4a33;
            --highlight: #22c55e;
            --fragment: #3b82f6;
            --blue-ui: #2e4a7a;
        }

        body { background-color: var(--bg-color); color: #f0e6d2; font-family: 'Tahoma', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .nav-tabs { display: flex; gap: 5px; margin-bottom: 20px; width: 100%; max-width: 1200px; }
        .tab-btn { flex: 1; padding: 15px; background: #3d352b; border: 2px solid var(--border); color: #aaa; cursor: pointer; font-weight: bold; border-radius: 8px 8px 0 0; }
        .tab-btn.active { background: var(--panel-bg); color: var(--gold); border-bottom: 2px solid var(--gold); }

        #main-content { width: 100%; max-width: 1200px; }
        .page { display: none; }
        .page.active { display: block; }

        input { background: #121212; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 5px; }
        button { background: linear-gradient(to bottom, #8b6b32, #5c4a33); border: 1px solid var(--gold); color: white; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .btn-red { background: linear-gradient(to bottom, #8b3232, #5c3333); border-color: #f88; }
        
        .box { background: #231f1a; border: 2px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 20px; }

        /* Party UI */
        .party-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .party-window { background: #252a35; border: 2px solid #506070; border-radius: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .party-title { background: linear-gradient(to bottom, #4a6a9a, #2e4a7a); padding: 8px 12px; font-weight: bold; display: flex; justify-content: space-between; font-size: 14px; }
        
        /* สไตล์ปุ่มกดแก้เลข */
        .party-num-btn { 
            background: rgba(0,0,0,0.3); 
            padding: 2px 8px; 
            border-radius: 4px; 
            border: 1px solid var(--gold); 
            cursor: pointer; 
            color: var(--gold);
            margin-left: 5px;
        }
        .party-num-btn:hover { background: var(--gold); color: #000; }

        .party-body { padding: 10px; display: flex; flex-direction: column; gap: 5px; min-height: 150px; }
        .member-slot { background: rgba(0,0,0,0.3); border: 1px solid #3d4a5a; padding: 6px 10px; border-radius: 3px; display: flex; justify-content: space-between; font-size: 14px; }
        .add-btn { background: rgba(255,255,255,0.1); border: 2px dashed #506070; color: #506070; padding: 8px; text-align: center; cursor: pointer; font-size: 18px; margin-top: 10px; }
        
        .admin-only { display: none; }
    </style>
</head>
<body>

    <div id="main-content">
        <div style="text-align: right; margin-bottom: 10px;">
            <button id="unlock-btn" onclick="toggleAdmin()">🔓 Manager Only</button>
            <button id="lock-btn" class="btn-red" onclick="lockAdmin()" style="display:none;">🔒 Lock</button>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('auction-page', this)">ประมูลของวอร์</button>
            <button class="tab-btn" onclick="switchTab('party-page', this)">จัดการปาร์ตี้</button>
        </div>

        <!-- หน้าประมูล -->
        <div id="auction-page" class="page active">
            <!-- โค้ดส่วนประมูลเหมือนเดิม -->
            <div class="box admin-only" id="admin-auc-input">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="auc-name-input" placeholder="ชื่อตัวละคร...">
                    <button onclick="addAuction('card')">+ คิวสมุด</button>
                    <button onclick="addAuction('frag')" style="background:var(--blue-ui)">+ คิว Frag</button>
                </div>
            </div>
            <div class="queue-grid" id="auction-lists">
                <!-- ส่วนการแสดงผลคิว (ใช้ logic เดิมจากโค้ดก่อนหน้า) -->
            </div>
        </div>

        <!-- หน้าจัดการปาร์ตี้ -->
        <div id="party-page" class="page">
            <div class="box">
                <h3 style="margin:0; color:var(--gold)">1. เตรียมรายชื่อตัวละคร</h3>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input type="text" id="p-waiting-input" placeholder="ชื่อตัวละคร..." style="flex-grow:1">
                    <button onclick="addWaiting()">เพิ่มชื่อ</button>
                </div>
                <div id="waiting-area" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:15px;"></div>
            </div>

            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h3 style="margin:0; color:var(--gold)">2. รายการปาร์ตี้ (เรียงตามเลข)</h3>
                <button onclick="createParty()" style="background:var(--highlight)">+ สร้างปาร์ตี้ใหม่</button>
            </div>
            <div id="party-grid" class="party-grid"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://rooc-update-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let isAdmin = false;

        function switchTab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // --- Admin Logic ---
        function toggleAdmin() {
            if (prompt("รหัสผ่าน:") === 'wtf') {
                isAdmin = true;
                document.getElementById('unlock-btn').style.display = 'none';
                document.getElementById('lock-btn').style.display = 'inline-block';
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                startListening();
            }
        }
        function lockAdmin() {
            isAdmin = false;
            document.getElementById('unlock-btn').style.display = 'inline-block';
            document.getElementById('lock-btn').style.display = 'none';
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
            startListening();
        }

        // --- Core Sync ---
        function startListening() {
            db.ref('party_v2').on('value', s => {
                const d = s.val() || {};
                renderWaiting(d.waiting || []);
                renderParties(d.parties || {}, d.waiting || []);
            });
            // (รวม logic ประมูลจากเวอร์ชันก่อนหน้ามาใส่ตรงนี้ได้เลย)
        }
        startListening();

        // --- Party Functions ---
        function addWaiting() {
            const inp = document.getElementById('p-waiting-input');
            if(!inp.value) return;
            db.ref('party_v2/waiting').once('value', s => {
                const list = s.val() || []; list.push(inp.value);
                db.ref('party_v2/waiting').set(list); inp.value = '';
            });
        }

        function renderWaiting(list) {
            const area = document.getElementById('waiting-area'); area.innerHTML = '';
            list.forEach((name, i) => {
                const item = document.createElement('div');
                item.style = "background:#3d352b; padding:5px 10px; border-radius:15px; border:1px solid var(--gold); font-size:13px;";
                item.innerHTML = `${name} <span onclick="delWaiting(${i})" style="color:red; cursor:pointer; margin-left:5px">x</span>`;
                area.appendChild(item);
            });
        }

        function delWaiting(i) {
            db.ref('party_v2/waiting').once('value', s => {
                let list = s.val(); list.splice(i, 1);
                db.ref('party_v2/waiting').set(list);
            });
        }

        function createParty() {
            db.ref('party_v2/parties').once('value', s => {
                const ps = s.val() || {};
                const id = 'p_' + Date.now();
                // บันทึกเฉพาะตัวเลข (p_num) แยกจาก ID
                db.ref('party_v2/parties/' + id).set({ p_num: Object.keys(ps).length + 1, members: [] });
            });
        }

        function renderParties(parties, waiting) {
            const grid = document.getElementById('party-grid'); grid.innerHTML = '';
            
            // แปลงและ Sort ตามตัวเลข p_num
            const sorted = Object.keys(parties).map(id => ({ id, ...parties[id] }))
                .sort((a, b) => (parseInt(a.p_num) || 0) - (parseInt(b.p_num) || 0));

            sorted.forEach(p => {
                const win = document.createElement('div');
                win.className = 'party-window';
                const membersHTML = (p.members || []).map((m, i) => `
                    <div class="member-slot"><span>${m}</span><span onclick="removeMember('${p.id}',${i})" style="color:red; cursor:pointer">X</span></div>
                `).join('');

                win.innerHTML = `
                    <div class="party-title">
                        <span>Party # <span class="party-num-btn" onclick="editPartyNum('${p.id}', ${p.p_num})">${p.p_num}</span></span>
                        <span onclick="delParty('${p.id}')" style="cursor:pointer; font-size:10px">[ลบตี้]</span>
                    </div>
                    <div class="party-body">
                        ${membersHTML}
                        <div class="add-btn" onclick="document.getElementById('sel-${p.id}').style.display='block'">+</div>
                        <select id="sel-${p.id}" style="display:none; margin-top:5px; background:#000; color:#fff;" onchange="assignMember('${p.id}', this)">
                            <option value="">-- เลือกคน --</option>
                            ${waiting.map((name, i) => `<option value="${i}">${name}</option>`).join('')}
                        </select>
                    </div>`;
                grid.appendChild(win);
            });
        }

        function editPartyNum(id, currentNum) {
            const newNum = prompt("ระบุเลขปาร์ตี้ใหม่ (เช่น 1, 2, 3):", currentNum);
            if (newNum !== null && newNum !== "") {
                db.ref(`party_v2/parties/${id}/p_num`).set(parseInt(newNum));
            }
        }

        function assignMember(pId, sel) {
            if(sel.value === "") return;
            db.ref('party_v2').once('value', s => {
                const d = s.val();
                let waiting = d.waiting, party = d.parties[pId];
                if(!party.members) party.members = [];
                const [name] = waiting.splice(sel.value, 1);
                party.members.push(name);
                db.ref('party_v2').update({ waiting, ['parties/'+pId]: party });
            });
        }

        function removeMember(pId, mIdx) {
            db.ref('party_v2').once('value', s => {
                const d = s.val();
                let party = d.parties[pId], waiting = d.waiting || [];
                const [name] = party.members.splice(mIdx, 1);
                waiting.push(name);
                db.ref('party_v2').update({ waiting, ['parties/'+pId]: party });
            });
        }

        function delParty(id) {
            if(!confirm('ลบปาร์ตี้?')) return;
            db.ref('party_v2').once('value', s => {
                const d = s.val();
                let waiting = d.waiting || [];
                const members = d.parties[id].members || [];
                db.ref('party_v2/waiting').set([...waiting, ...members]);
                db.ref('party_v2/parties/' + id).remove();
            });
        }
    </script>
</body>
</html>
