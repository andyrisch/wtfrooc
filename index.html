<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RO Guild Queue - Cloud System</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --accent: #f59e0b; --danger: #ef4444; --text: #f1f5f9; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { text-align: center; background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 25px; border-bottom: 4px solid var(--primary); }
        .btn-party { display: inline-block; margin-top: 12px; background: #7c3aed; color: white; font-weight: bold; border: none; border-radius: 8px; padding: 10px 24px; cursor: pointer; font-size: 0.95rem; text-decoration: none; }
        .btn-party:hover { background: #6d28d9; }
        .stock-bar { background: #334155; padding: 15px; border-radius: 10px; margin-bottom: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border: 1px solid #475569; }
        .stock-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .stock-input { background: #0f172a; border: 1px solid var(--primary); color: white; padding: 8px; width: 80px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; }
        .btn-add { background: var(--primary); color: #0f172a; font-weight: bold; border: none; border-radius: 8px; padding: 0 20px; cursor: pointer; }
        .queue-list { display: flex; flex-direction: column; gap: 10px; }
        .item { background: #1e293b; padding: 15px; border-radius: 10px; border: 1px solid #334155; transition: 0.3s; }
        .item.active-feather { border: 2px solid var(--danger); background: #450a0a; }
        .item.active-album { border: 2px solid var(--accent); background: #45290a; }
        .item-row { display: flex; justify-content: space-between; align-items: center; }
        .name-tag { font-size: 1.1rem; font-weight: bold; }
        .badge { font-size: 0.9rem; margin-top: 6px; display: inline-block; padding: 4px 10px; border-radius: 4px; font-weight: bold; }
        .actions { display: flex; gap: 8px; }
        .btn-loop { background: #10b981; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
        .btn-del { background: transparent; color: #64748b; border: 1px solid #334155; padding: 8px 10px; border-radius: 6px; cursor: pointer; }
        .status-cloud { font-size: 0.7rem; color: #10b981; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>ระบบคิวประมูลกิลด์ (CLOUD SYNC)</h1>
        <div id="cloudStatus" class="status-cloud">☁️ เชื่อมต่อระบบ Cloud แล้ว</div>
        <a href="party.html" class="btn-party">⚔️ จัดตั้ง Party →</a>
    </div>

    <div class="stock-bar">
        <div class="stock-item">
            <span>🪶 จำนวนหน้าขนนกขาว</span>
            <input type="number" id="fStock" class="stock-input" value="14" onchange="saveCloudData()">
        </div>
        <div class="stock-item">
            <span>📖 จำนวนเล่มสมุดการ์ด</span>
            <input type="number" id="aStock" class="stock-input" value="10" onchange="saveCloudData()">
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>🪶 คิวขนนก</h2>
            <div class="input-group">
                <input type="text" id="fInput" placeholder="เพิ่มชื่อ..." onkeypress="if(event.key==='Enter') add('feather')">
                <button class="btn-add" onclick="add('feather')">เพิ่ม</button>
            </div>
            <div id="fList" class="queue-list"></div>
        </div>
        <div class="card">
            <h2>📖 คิวสมุด</h2>
            <div class="input-group">
                <input type="text" id="aInput" placeholder="เพิ่มชื่อ..." onkeypress="if(event.key==='Enter') add('album')">
                <button class="btn-add" style="background:var(--accent)" onclick="add('album')">เพิ่ม</button>
            </div>
            <div id="aList" class="queue-list"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYrNg9viyiItkFuNes3Bn2yqv4E82ubVs",
        authDomain: "ro-guild-queue.firebaseapp.com",
        databaseURL: "https://ro-guild-queue-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ro-guild-queue",
        storageBucket: "ro-guild-queue.firebasestorage.app",
        messagingSenderId: "506020314747",
        appId: "1:506020314747:web:d2afa06df8fd6179f32cde"
    };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('guild_queue');
    let localDb = { feather: [], album: [] };

    dbRef.on('value', (snap) => {
        const data = snap.val();
        if (data) {
            localDb = data.queues || {};
            localDb.feather = localDb.feather || [];
            localDb.album = localDb.album || [];
            document.getElementById('fStock').value = data.fStock || 14;
            document.getElementById('aStock').value = data.aStock || 10;
            render();
        }
    });

    function saveCloudData() {
        dbRef.set({
            queues: localDb,
            fStock: document.getElementById('fStock').value,
            aStock: document.getElementById('aStock').value
        });
    }

    function add(type) {
        const inputId = { feather: 'fInput', album: 'aInput' };
        const input = document.getElementById(inputId[type]);
        if (!input.value.trim()) return;
        localDb[type].push(input.value.trim());
        input.value = '';
        saveCloudData();
    }

    function moveToEnd(type, index) {
        let name = localDb[type].splice(index, 1)[0];
        localDb[type].push(name);
        saveCloudData();
    }

    function remove(type, index) {
        if (confirm("ลบคิวนี้?")) {
            localDb[type].splice(index, 1);
            saveCloudData();
        }
    }

    function render() {
        const fStock = parseInt(document.getElementById('fStock').value) || 0;
        const aStock = parseInt(document.getElementById('aStock').value) || 0;

        const fList = document.getElementById('fList');
        fList.innerHTML = '';
        (localDb.feather || []).forEach((name, i) => {
            const isActive = (i + 1) <= fStock;
            fList.innerHTML += `<div class="item ${isActive ? 'active-feather' : ''}">
                <div class="item-row">
                    <span class="name-tag">${i+1}. ${name}</span>
                    <div class="actions">
                        <button class="btn-loop" onclick="moveToEnd('feather',${i})">✔️ วนคิว</button>
                        <button class="btn-del" onclick="remove('feather',${i})">ลบ</button>
                    </div>
                </div>
                ${isActive ? `<span class="badge" style="background:#0f172a;color:#38bdf8">หน้าที่ ${i+1}</span>` : ''}
            </div>`;
        });

        const aList = document.getElementById('aList');
        aList.innerHTML = '';
        (localDb.album || []).forEach((name, i) => {
            const isActive = (i + 1) <= aStock;
            aList.innerHTML += `<div class="item ${isActive ? 'active-album' : ''}">
                <div class="item-row">
                    <span class="name-tag">${i+1}. ${name}</span>
                    <div class="actions">
                        <button class="btn-loop" onclick="moveToEnd('album',${i})">✔️ วนคิว</button>
                        <button class="btn-del" onclick="remove('album',${i})">ลบ</button>
                    </div>
                </div>
                ${isActive ? `<span class="badge" style="background:#0f172a;color:#f59e0b">เล่มที่ ${i+1}</span>` : ''}
            </div>`;
        });
    }
</script>
</body>
</html>
